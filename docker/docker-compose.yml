# =============================================================================
# ClaimsOps Development Environment - Docker Compose Configuration
# =============================================================================
# Defines containerized services for local development.
# All credentials are loaded from .env file (see .env.example for template).
#
# Services:
#   postgres        - PostgreSQL 15 database for claims-service
#   claims-service  - C# .NET Web API for managing insurance claims
#   audit-service   - Python FastAPI microservice for audit events
#
# Commands:
#   Start:  docker-compose up -d
#   Stop:   docker-compose down
#   Logs:   docker-compose logs -f claims-service
#   Reset:  docker-compose down -v (removes all data)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  # Primary data store for claims and audit events.
  # Connection string: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:${POSTGRES_PORT}/${POSTGRES_DB}
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: claimsops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - claimsops-network

  # ---------------------------------------------------------------------------
  # Claims Service
  # ---------------------------------------------------------------------------
  # C# .NET Web API for managing insurance claims.
  # Built locally from services/claims-service/Dockerfile.
  # Depends on PostgreSQL for data persistence.
  # Port: 5115
  # ---------------------------------------------------------------------------
  claims-service:
    build:
      context: ..
      dockerfile: services/claims-service/Dockerfile
    container_name: claimsops-claims-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5115
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      AuditService__BaseUrl: "http://audit-service:8000"
    ports:
      - "5115:5115"
    depends_on:
      postgres:
        condition: service_healthy
      audit-service:
        condition: service_started
    networks:
      - claimsops-network
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Audit Service
  # ---------------------------------------------------------------------------
  # Python FastAPI microservice for recording audit events.
  # Stores events in memory (no persistence for MVP).
  # Called by claims-service when claims are created/updated.
  # Port: 8000
  # ---------------------------------------------------------------------------
  audit-service:
    build:
      context: ..
      dockerfile: services/audit-service/Dockerfile
    container_name: claimsops-audit-service
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    networks:
      - claimsops-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Volumes
# =============================================================================
# Named volumes persist data between container restarts.
# Use 'docker-compose down -v' to remove volumes and reset database.
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
# Internal bridge network for service-to-service communication.
# Services can reference each other by container name (e.g., claimsops-postgres).
# =============================================================================
networks:
  claimsops-network:
    driver: bridge
